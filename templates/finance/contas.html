{% extends 'base_dashboard.html' %}

{% block title %}Minhas Contas{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-4">
                    <a href="{% url 'finance:dashboard' %}" class="text-gray-600 hover:text-gray-900">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                        </svg>
                    </a>
                    <h1 class="text-xl font-semibold text-gray-900">Minhas Contas</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-600 hidden sm:inline">{{ user.email }}</span>
                    <a href="{% url 'core:logout' %}" class="text-sm text-gray-600 hover:text-gray-900">Sair</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div style="display:none">{% csrf_token %}</div>
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
            <h2 class="text-2xl font-bold text-gray-900">Minhas Contas</h2>
            <button type="button" id="btnNovaConta" class="btn-neon px-4 py-2 text-sm font-medium rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                + Nova Conta
            </button>
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
                            <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Tipo</th>
                            <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Saldo Inicial</th>
                            <th class="px-4 sm:px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-4 sm:px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="contasTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<!-- Modal Nova/Editar Conta -->
<div id="modalConta" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true"></div>
        <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <h3 id="modalContaTitle" class="text-lg font-semibold text-gray-900 mb-4">Nova Conta</h3>
                <form id="formConta">
                    <input type="hidden" id="contaId" name="conta_id" value="">
                    <div class="space-y-4">
                        <div>
                            <label for="contaNome" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
                            <input type="text" id="contaNome" name="nome" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-base"
                                   placeholder="Ex: C6 Bank">
                        </div>
                        <div>
                            <label for="contaTipo" class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                            <select id="contaTipo" name="tipo" required
                                    class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-base">
                                <option value="bank">Conta Bancária</option>
                                <option value="cash">Dinheiro</option>
                                <option value="credit_card">Cartão de Crédito</option>
                                <option value="investment">Investimento</option>
                                <option value="other">Outro</option>
                            </select>
                        </div>
                        <div>
                            <label for="contaSaldo" class="block text-sm font-medium text-gray-700 mb-1">Saldo Inicial (R$)</label>
                            <input type="number" id="contaSaldo" name="saldo_inicial" step="0.01" value="0"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-base">
                        </div>
                    </div>
                    <div class="mt-6 flex space-x-3 justify-end">
                        <button type="button" id="btnModalFechar" class="px-4 py-2 bg-gray-200 text-gray-700 text-sm font-medium rounded-lg hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500">
                            Cancelar
                        </button>
                        <button type="submit" id="btnModalSalvar" class="btn-neon px-4 py-2 text-sm font-medium rounded-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
                            Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const API_CONTAS = '/finance/api/contas/';
const TIPO_LABELS = {
    bank: 'Conta Bancária',
    cash: 'Dinheiro',
    credit_card: 'Cartão de Crédito',
    investment: 'Investimento',
    other: 'Outro'
};

function formatCurrency(value) {
    return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value || 0);
}

async function loadContas() {
    const tbody = document.getElementById('contasTableBody');
    try {
        const res = await fetch(API_CONTAS);
        const data = await res.json();
        const contas = data.contas || [];
        if (contas.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">Nenhuma conta cadastrada.</td></tr>';
            return;
        }
        tbody.innerHTML = contas.map(c => {
            const status = c.ativa !== false ? 'Ativa' : 'Inativa';
            const statusClass = c.ativa !== false ? 'bg-green-100 text-green-800' : 'bg-gray-100 text-gray-800';
            const podeExcluir = c.id !== 'conta_principal';
            return `
                <tr class="hover:bg-gray-50">
                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${escapeHtml(c.nome || '-')}</td>
                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-600">${escapeHtml(TIPO_LABELS[c.tipo] || c.tipo || '-')}</td>
                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-sm text-gray-600">${formatCurrency(c.saldo_inicial)}</td>
                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap">
                        <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusClass}">${status}</span>
                    </td>
                    <td class="px-4 sm:px-6 py-4 whitespace-nowrap text-right text-sm">
                        <button type="button" class="text-primary-600 hover:text-primary-800 mr-3 edit-conta" data-id="${escapeHtml(c.id)}" data-nome="${escapeHtml(c.nome || '')}" data-tipo="${escapeHtml(c.tipo || 'other')}" data-saldo="${c.saldo_inicial != null ? c.saldo_inicial : 0}">Editar</button>
                        ${podeExcluir ? `<button type="button" class="text-red-600 hover:text-red-800 delete-conta" data-id="${escapeHtml(c.id)}" data-nome="${escapeHtml(c.nome || '')}">Excluir</button>` : ''}
                    </td>
                </tr>
            `;
        }).join('');
        bindTableActions();
    } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-red-600">Erro ao carregar contas.</td></tr>';
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function bindTableActions() {
    document.querySelectorAll('.edit-conta').forEach(btn => {
        btn.addEventListener('click', () => openModalEdit(btn.dataset.id, btn.dataset.nome, btn.dataset.tipo, parseFloat(btn.dataset.saldo) || 0));
    });
    document.querySelectorAll('.delete-conta').forEach(btn => {
        btn.addEventListener('click', () => confirmDelete(btn.dataset.id, btn.dataset.nome));
    });
}

const modal = document.getElementById('modalConta');
const form = document.getElementById('formConta');
const modalTitle = document.getElementById('modalContaTitle');
const contaId = document.getElementById('contaId');
const contaNome = document.getElementById('contaNome');
const contaTipo = document.getElementById('contaTipo');
const contaSaldo = document.getElementById('contaSaldo');

function openModalNew() {
    modalTitle.textContent = 'Nova Conta';
    contaId.value = '';
    form.reset();
    contaSaldo.value = '0';
    modal.classList.remove('hidden');
}

function openModalEdit(id, nome, tipo, saldo) {
    modalTitle.textContent = 'Editar Conta';
    contaId.value = id;
    contaNome.value = nome;
    contaTipo.value = tipo || 'other';
    contaSaldo.value = saldo != null ? saldo : 0;
    modal.classList.remove('hidden');
}

function closeModal() {
    modal.classList.add('hidden');
}

document.getElementById('btnNovaConta').addEventListener('click', openModalNew);
document.getElementById('btnModalFechar').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const id = contaId.value.trim();
    const payload = {
        nome: contaNome.value.trim(),
        tipo: contaTipo.value,
        saldo_inicial: parseFloat(contaSaldo.value) || 0
    };
    const btnSalvar = document.getElementById('btnModalSalvar');
    btnSalvar.disabled = true;
    try {
        if (id) {
            const res = await fetch(API_CONTAS + encodeURIComponent(id) + '/', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Erro ao atualizar conta.');
                return;
            }
        } else {
            const res = await fetch(API_CONTAS, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' },
                body: JSON.stringify(payload)
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                alert(err.error || 'Erro ao criar conta.');
                return;
            }
        }
        closeModal();
        await loadContas();
    } finally {
        btnSalvar.disabled = false;
    }
});

async function confirmDelete(id, nome) {
    if (!confirm(`Desativar a conta "${nome}"? Ela não aparecerá na lista de contas ativas.`)) return;
    try {
        const res = await fetch(API_CONTAS + encodeURIComponent(id) + '/', {
            method: 'DELETE',
            headers: { 'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]')?.value || '' }
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
            alert(data.error || 'Erro ao desativar conta.');
            return;
        }
        await loadContas();
    } catch (e) {
        alert('Erro ao desativar conta.');
    }
}

document.addEventListener('DOMContentLoaded', () => loadContas());
</script>
{% endblock %}
